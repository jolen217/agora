name: Reference Authenticity Check

on:
  pull_request:
    paths:
      - 'dialogues/**'
      - 'topics/**'
      - 'proposals/**'

permissions:
  pull-requests: write

jobs:
  check-references:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Find changed Markdown files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(dialogues|topics|proposals)/.*\.md$' \
            > changed_files.txt || true

      - name: Check references
        run: python .github/scripts/check_references.py changed_files.txt > report.md

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8').trim();
            if (!body) return;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
